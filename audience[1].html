<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSSA — A Nobel's Day</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a4b7a;font-family:'Lato',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;}

#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;}
#loading p{font-size:13px;color:rgba(255,255,255,.5);}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#4dd9a0;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#error-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
#error-screen p{color:#f87171;font-size:14px;max-width:360px;line-height:1.6;}

#app{display:none;flex-direction:column;min-height:100vh;}

.logos{background:#1a4b7a;padding:14px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.15);flex-wrap:wrap;}
.logo-circle{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-align:center;line-height:1.2;flex-shrink:0;}
.logo-sep{width:1px;height:28px;background:rgba(255,255,255,.2);flex-shrink:0;}
.logo-text{font-size:9px;color:rgba(255,255,255,.65);line-height:1.35;}
.syssa-logo{background:rgba(255,255,255,.1);border-radius:4px;padding:3px 7px;font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;}
.gold-circle{border-color:#e8c96a;color:#e8c96a;background:rgba(232,201,106,.1);font-size:8px;}

.page-title{text-align:center;padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.15);}
.page-title h1{font-size:16px;font-weight:700;color:#e8c96a;letter-spacing:.03em;line-height:1.4;}

.now-section{padding:20px 20px 0;}
.now-card{background:rgba(29,158,117,.2);border:2px solid #4dd9a0;border-radius:12px;padding:20px;transition:border-color .3s;}
.now-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.live-dot{width:10px;height:10px;border-radius:50%;background:#4dd9a0;animation:pulse 1.4s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-tag{font-size:11px;font-weight:700;color:#4dd9a0;text-transform:uppercase;letter-spacing:.08em;}
.now-speaker{font-size:20px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:6px;}
.now-title{font-size:13px;color:rgba(77,217,160,.9);line-height:1.5;}
.now-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px;line-height:1.4;}
.speaker-timer{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:rgba(0,0,0,.2);border-radius:20px;padding:4px 10px;}
.speaker-timer-icon{font-size:10px;color:rgba(77,217,160,.7);}
.speaker-timer-val{font-size:12px;font-weight:700;color:#4dd9a0;font-variant-numeric:tabular-nums;letter-spacing:.03em;}

.next-section{padding:14px 20px 0;}
.next-card{background:rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.next-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.next-label{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.next-name{font-size:14px;font-weight:700;color:rgba(255,255,255,.85);}
.next-title{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.4;}

.agenda-section{padding:18px 20px 0;}
.agenda-section h3{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.a-session-title{font-size:11px;font-weight:700;color:#e8c96a;text-transform:uppercase;letter-spacing:.05em;padding:8px 0 5px;border-top:1px solid rgba(255,255,255,.1);margin-top:4px;}
.a-session-title:first-child{border-top:none;padding-top:0;}
.a-row{display:flex;gap:0;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.a-row.a-live{background:rgba(29,158,117,.15);border-radius:6px;padding:7px 8px;margin:0 -8px;border-bottom:none;}
.a-row.a-break{opacity:.45;}
.a-time{min-width:76px;font-size:11px;font-weight:700;color:#e8c96a;flex-shrink:0;padding-top:1px;}
.a-divl{width:1px;background:rgba(255,255,255,.18);flex-shrink:0;margin:2px 0;}
.a-info{flex:1;padding-left:10px;}
.a-name{font-size:12px;font-weight:700;color:#fff;line-height:1.35;}
.a-row.a-live .a-name{color:#4dd9a0;}
.a-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;line-height:1.35;}
.a-row.a-live .a-sub{color:rgba(77,217,160,.65);}
.a-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:5px;vertical-align:middle;}
.a-badge-live{background:#4dd9a0;color:#0a3d2a;}
.a-badge-next{background:rgba(255,255,255,.12);color:rgba(255,255,255,.55);}

.footer{padding:14px 20px;text-align:center;border-top:1px solid rgba(255,255,255,.1);margin-top:20px;}
.footer-status{font-size:11px;color:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;gap:6px;}
.f-dot{width:6px;height:6px;border-radius:50%;background:#4dd9a0;}
.f-dot.off{background:#f87171;animation:none;}
</style>
</head>
<body>

  <div class="spinner"></div>
  <p>კავშირი მყარდება...</p>
</div>

<div id="error-screen">
  <p>❌ კავშირი ვერ დამყარდა.<br>შეამოწმე ინტერნეტი.</p>
</div>

<div id="app">
  <div class="logos">
    <div class="logo-circle">DTMU</div>
    <div class="logo-sep"></div>
    <div>
      <div class="logo-text" style="font-weight:700;color:#fff;font-size:10px">CAUCASUS</div>
      <div class="logo-text">MEDICAL CENTRE</div>
    </div>
    <div class="logo-sep"></div>
    <div class="logo-circle" style="font-size:8px">QUAL</div>
    <div class="logo-sep"></div>
    <div class="syssa-logo">S|Y|S|S|A</div>
    <div class="logo-sep"></div>
    <div class="logo-circle gold-circle">NOBEL</div>
  </div>

  <div class="page-title">
    <h1>STUDENTS' AND YOUNG SCIENTISTS'<br>XIII SCIENTIFIC SESSION: A NOBEL'S DAY</h1>
  </div>

  <div class="now-section">
    <div class="now-card" id="now-card">
      <div class="now-top">
        <div class="live-dot"></div>
        <div class="live-tag">Now Speaking</div>
      </div>
      <div class="now-speaker" id="now-speaker">—</div>
      <div class="now-title" id="now-title"></div>
      <div class="now-sub" id="now-sub"></div>
      <div class="speaker-timer">
        <span class="speaker-timer-icon">⏱</span>
        <span class="speaker-timer-val" id="aud-timer">00:00</span>
      </div>
    </div>
  </div>

  <div class="next-section">
    <div class="next-card">
      <div class="next-icon">▶</div>
      <div>
        <div class="next-label">Up next</div>
        <div class="next-name" id="next-name">—</div>
        <div class="next-title" id="next-title"></div>
      </div>
    </div>
  </div>

  <div class="agenda-section">
    <h3>Full Agenda</h3>
    <div id="agenda-list"></div>
  </div>

  <div class="footer">
    <div class="footer-status">
      <div class="f-dot" id="f-dot"></div>
      <span id="f-label">Real-time</span>
      <span style="color:rgba(255,255,255,.15)">·</span>
      <span id="f-time">—</span>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://wxhaukichoycniioakbo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4aGF1a2ljaG95Y25paW9ha2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDkxMjMsImV4cCI6MjA5NTIyNTEyM30.TEnZNISEzaCpGsj7liO4v6ihXgvyL8PnWwkHIP525Kw';

const AGENDA = [
  {id:1,  time:"09:30–10:00", speaker:"Registration, Coffee Break",          title:"",                                                                                                            session:"pre",    isBreak:true},
  {id:2,  time:"10:00–10:30", speaker:"Opening Ceremony",                     title:"Chairmen: Georgi Riabinkin, Mariam Chubinidze\nWelcome: Sophio Aspanidze · Nino Tabagari, MD, PhD",        session:"opening",isBreak:true},
  {id:3,  time:"10:30–10:45", speaker:"Giorgi Aladashvili, MD",               title:"Pioneering Science: The 2024 Nobel Prizes in Medicine and Beyond",                                          session:"opening"},
  {id:4,  time:"10:45–11:00", speaker:"Nino Giorgadze",                       title:"Medical Professionalism and Research Ethics: Stereotype Requirements and Beyond",                            session:"opening"},
  {id:5,  time:"11:00–11:15", speaker:"Anano Verdzadze",                      title:"Problems of Bone Mineral Density in the Pediatric Population of Adjara Region\nSupervisor: Neriman Tsintsadze, MD, Ph.D.", session:"students"},
  {id:6,  time:"11:15–11:30", speaker:"Nana Megrelidze, M.D.",                title:"Subarachnoid Hemorrhage Mimicking STEMI\nSupervisor: Magda Litzkendorf, M.D., Helios Klinikum Erfurt",    session:"students"},
  {id:7,  time:"11:30–11:45", speaker:"Vasil Petriashvili",                   title:"Treatment of Hypertrophic Cardiomyopathy with Severe Refractory Symptoms\nCo-author: Elene Shioshvili",    session:"students"},
  {id:8,  time:"11:45–12:00", speaker:"Ketevan Tchitchinadze, MS.",           title:"Biodegradable Heart Stents Revolutionizing Coronary Care\nSupervisor: Guram Sanadiradze, M.D., Ph.D.",    session:"students"},
  {id:9,  time:"12:00–12:15", speaker:"Anna Bechvaya, MS.",                   title:"Produodopa Easier Way to Live with Parkinson's\nSupervisor: Eka Chkhartishvili, M.D., Ph.D.",             session:"students"},
  {id:10, time:"12:15–12:30", speaker:"Vera Savidi, MS.",                     title:"Transthyretin Amyloid Cardiomyopathy — A Silent Killer\nSupervisor: Guram Sanadiradze, M.D., Ph.D.",      session:"students"},
  {id:11, time:"12:30–12:45", speaker:"Taha Kassim, MS.",                     title:"Rare Case of Syphilis: The Tullio Phenomenon Disclosure\nSupervisor: Tamar Chachibaia, M.D., PhD",        session:"students"},
  {id:12, time:"12:45–13:00", speaker:"Syeda Fatima Zehra",                   title:"Therapeutic Potential Mesenchymal Exosomes in Pulmonary Fibrosis\nSupervisor: Ana Tchania, MD",            session:"students"},
  {id:13, time:"13:00–14:00", speaker:"Lunch Break",                          title:"",                                                                                                            session:"break",  isBreak:true},
  {id:14, time:"14:00–",      speaker:"Tamar Kacharava",                      title:"Fetal Programming: ADHD-like Symptoms in Early Childhood\nSupervisor: Dr. Ketevan Nemsadze, Ph.D., Prof.", session:"phd"},
  {id:15, time:"",            speaker:"Nino Khutsishvili",                    title:"Intradermal Glucocorticosteroid Microinjections and Topical Minoxidil in Female Androgenetic Alopecia\nSupervisor: Prof. Nino Lortkipanidze", session:"phd"},
  {id:16, time:"",            speaker:"Tamar Gaprindashvili",                 title:"Blood Pressure Response to Sub Maximal Exercise and Left Ventricular Hypertrophy\nSupervisors: Prof. Rusudan Agladze · Zurab Pagava", session:"phd"},
  {id:17, time:"",            speaker:"Vakhtang Gurabanidze",                 title:"Inflammatory Markers and Visceral Adipose Tissue in Development of Preeclampsia\nSupervisor: Tinatin Gagua, Associate Professor", session:"phd"},
  {id:18, time:"",            speaker:"Aleksandre Ramishvili",                title:"Geomagnetic Storms on Heart Rate Variability and EEG α Frontal Asymmetry in Healthy Males\nSupervisors: Ketevan Janashia · Prof. Levan Tvildiani", session:"phd"},
  {id:19, time:"",            speaker:"Elene Sherozia",                       title:"Diagnosis and Management of Progressive Fibrosing Interstitial Lung Diseases in Georgia\nSupervisors: Prof. Nino Tabagari · Prof. Maia Gotua", session:"phd"},
  {id:20, time:"",            speaker:"Mariam Kacheishvili",                  title:"Optimizing Medical Education: The Integration and Impact of Whole Slide Imaging\nSupervisors: Prof. Nino Tabagari · Prof. Alexi Baidoshvili", session:"phd"},
  {id:21, time:"",            speaker:"David Makaridze",                      title:"Diagnostic Accuracy of Aneurysmal Bone Cyst (ABC): Immunohistochemical Aspects\nSupervisor: Liana Gogiashvili", session:"phd"},
  {id:22, time:"",            speaker:"Tamta Darsalia",                       title:"Preoperative Frailty and Postoperative Disorders in Geriatric Patients in Georgia\nSupervisor: Tamar Macharadze MD, Ph.D.", session:"phd"},
  {id:23, time:"",            speaker:"Tinatin Giuashvili",                   title:"Early Detection of Cerebral Palsy Risk and Neurodevelopmental Outcome\nSupervisor: Prof. Nana Tatishvili PhD, MD", session:"phd"},
  {id:24, time:"",            speaker:"Ana Bedoshvili",                       title:"Cerebral Visual Impairment (CVI) on Neurodevelopmental Outcome in Children at High Risk of Cerebral Palsy\nSupervisors: S. Tatishvili · N. Tatishvili · A. Guzzetta · R.N. Boyd", session:"phd"},
  {id:25, time:"",            speaker:"Ana Khoperia",                         title:"Liquid-Based Cytology vs Routine Cytology Smears for Intraepithelial Lesion Detection\nSupervisor: Archil Sharashenidze, MD, Ph.D.", session:"phd"},
  {id:26, time:"",            speaker:"Mariam Gugushvili",                    title:"Energy Homeostasis in Adolescence with Polycystic Ovary Syndrome\nSupervisor: Prof. B. Tkeshelashvili Ph.D. MD", session:"phd"},
  {id:27, time:"",            speaker:"Nino Zavrashvili",                     title:"Calectin-3 and Glycoalbumin as Candidate Markers of Evaluation Type II\nSupervisor: Prof. Sergo Tabagari", session:"phd"},
  {id:28, time:"",            speaker:"Ana Kvernadze, MD, Ph.D.",             title:"Rare and Complex Epilepsies – Correlation Between Aetiology and Outcome\nSupervisor: Prof. Nana Tatishvili Ph.D. MD", session:"phd"},
  {id:29, time:"17:00",       speaker:"Closing",                              title:"",                                                                                                            session:"closing",isBreak:true},
];

let sb = null;
let currentId = 3;
let speakerStartedAt = Date.now();
let audTimerInterval = null;

function getNext(fromId) {
  const ci = AGENDA.findIndex(a => a.id === fromId);
  for (let i = ci + 1; i < AGENDA.length; i++) {
    if (!AGENDA[i].isBreak) return AGENDA[i];
  }
  return null;
}

window.addEventListener('load', async () => {
  try {
    sb = supabase.createClient(SB_URL, SB_KEY);
    const { data, error } = await sb.from('live_state').select('current_id, speaker_started_at').eq('id', 1).single();
    if (error) throw error;
    currentId = data.current_id;
    speakerStartedAt = data.speaker_started_at ? new Date(data.speaker_started_at).getTime() : Date.now();
    startApp();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    console.error(e);
  }
});

function startApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  sb.channel('live_state_changes')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'live_state' }, payload => {
      currentId = payload.new.current_id;
      speakerStartedAt = payload.new.speaker_started_at ? new Date(payload.new.speaker_started_at).getTime() : Date.now();
      render();
      startAudTimer();
      const nc = document.getElementById('now-card');
      nc.style.borderColor = '#fff';
      setTimeout(() => nc.style.borderColor = '#4dd9a0', 600);
    })
    .subscribe(status => {
      const dot = document.getElementById('f-dot');
      const lbl = document.getElementById('f-label');
      if (status === 'SUBSCRIBED') {
        dot.classList.remove('off');
        lbl.textContent = 'Real-time კავშირი';
      } else {
        dot.classList.add('off');
        lbl.textContent = 'კავშირი...';
      }
    });

  render();
  startAudTimer();
  setInterval(() => {
    const d = new Date();
    document.getElementById('f-time').textContent =
      d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
  }, 1000);
}

function startAudTimer() {
  if (audTimerInterval) clearInterval(audTimerInterval);
  audTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - speakerStartedAt) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    const el = document.getElementById('aud-timer');
    if (el) el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 1000);
}

function render() {
  const cur = AGENDA.find(a => a.id === currentId);
  const nxt = getNext(currentId);
  const subs = cur ? cur.title.split('\n') : [];

  document.getElementById('now-speaker').textContent = cur ? cur.speaker : '—';
  document.getElementById('now-title').textContent = subs[0] || '';
  document.getElementById('now-sub').textContent = subs[1] || '';
  document.getElementById('next-name').textContent = nxt ? nxt.speaker : 'Program Concluded';
  document.getElementById('next-title').textContent = nxt ? (nxt.title.split('\n')[0] || '') : '';

  const SECTIONS = [
    { key:'pre', label:'' },
    { key:'opening', label:'Opening Session (10:00–11:00)' },
    { key:'students', label:"Students' Session (11:00–13:00)" },
    { key:'break', label:'' },
    { key:'phd', label:'PhD Session (14:00–17:00)' },
    { key:'closing', label:'' },
  ];
  let html = '';
  SECTIONS.forEach(sec => {
    const items = AGENDA.filter(a => a.session === sec.key);
    if (!items.length) return;
    if (sec.label) html += `<div class="a-session-title">${sec.label}</div>`;
    items.forEach(item => {
      const isCur = item.id === currentId;
      const isNxt = nxt && item.id === nxt.id;
      const s = item.title ? item.title.split('\n') : [];
      html += `<div class="a-row ${isCur?'a-live':''} ${item.isBreak?'a-break':''}">
        <div class="a-time">${item.time||''}</div>
        <div class="a-divl"></div>
        <div class="a-info">
          <div class="a-name">${item.speaker}
            ${isCur?'<span class="a-badge a-badge-live">● LIVE</span>':''}
            ${isNxt?'<span class="a-badge a-badge-next">▶ Next</span>':''}
          </div>
          ${s[0]?`<div class="a-sub"><b style="color:rgba(255,255,255,${isCur?'.75':'.5'})">${s[0]}</b></div>`:''}
        </div>
      </div>`;
    });
  });
  document.getElementById('agenda-list').innerHTML = html;

  setTimeout(() => {
    const live = document.querySelector('.a-row.a-live');
    if (live) live.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 200);
}
</script>
</body>
</html>
